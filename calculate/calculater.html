<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scientific Calculator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>

</head>

<body>

<div class="calc">

<div class="screen">
<div id="display">0</div>
</div>

<div class="row">
<button onclick="press('sin(')">sin</button>
<button onclick="press('cos(')">cos</button>
<button onclick="press('tan(')">tan</button>
<button onclick="press('sqrt(')">√</button>
<button onclick="press('^')">xʸ</button>
</div>

<div class="row">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>
<button onclick="clearDisplay()">AC</button>
</div>

<div class="row">
<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>
<button onclick="backspace()">DEL</button>
</div>

<div class="row">
<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">−</button>
<button onclick="press('(')">(</button>
</div>

<div class="row">
<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="press('+')">+</button>
<button onclick="calculate()">=</button>
<button onclick="press(')')">)</button>
</div>

<div class="row">
<button onclick="toBinary()">BIN</button>
<button onclick="toHex()">HEX</button>
<button onclick="toOctal()">OCT</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
