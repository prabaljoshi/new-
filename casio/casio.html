<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Casio-Style Playable Instrument</title>
  <style>
    :root {
      --bg:#000000;--card:#0b1220;--accent:#7dd3fc;--white:#f8fafc;
    }
    html,body {
      height:100%;margin:0;
      font-family:Inter,system-ui,Segoe UI,Roboto,Arial;
      background:linear-gradient(180deg,#071024 0%, #081323 100%);
      color:var(--white);
    }
    .app {
      max-width:980px;margin:28px auto;padding:18px;border-radius:12px;
      background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.02));
      box-shadow:0 8px 30px rgba(2,6,23,0.6);
    }
    header {display:flex;flex-direction:column;gap:8px}
    h1 {margin:0;font-size:22px}
    .controls {display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
    .control {
      background:var(--card);padding:10px;border-radius:10px;min-width:140px;
      flex:1;
    }
    label {display:block;font-size:12px;color:#93c5fd;margin-bottom:6px}
    input[type=range]{width:100%}
    select,input[type=number]{width:100%;padding:6px;border-radius:6px;border:none;background:#0b1220;color:var(--white)}
    .keyboard{margin-top:18px;user-select:none}
    .keys{display:flex;height:220px;position:relative}
    .key{flex:1;border-radius:6px;border:1px solid rgba(255,255,255,0.06);margin:2px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;cursor:pointer}
    .key.white{background:linear-gradient(180deg,#faf9f9 0%, #fefdfd 100%);color:#000;height:100%}
    .key.black{position:relative;width:44px;flex:0 0 44px;height:140px;margin:0 -22px;z-index:2;background:linear-gradient(180deg,#0b1220,#04060a);color:var(--white)}
    .key.playing{transform:translateY(6px);background:#7dd3fc;color:#000}
    .meta{display:flex;gap:8px;align-items:center;margin-top:12px}
    .hint{opacity:0.7;font-size:13px}
    footer{margin-top:14px;font-size:13px;color:#9fb7d8}
    @media (max-width:720px){
      .keys{height:160px}.key.black{height:100px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Casio-Style Playable Instrument</h1>
      <div class="hint">Click/touch keys or use your computer keyboard. Built with Web Audio API.</div>
    </header>

    <div class="controls">
      <div class="control">
        <label>Waveform</label>
        <select id="waveform">
          <option value="sine">Sine</option>
          <option value="square">Square</option>
          <option value="sawtooth">Sawtooth</option>
          <option value="triangle">Triangle</option>
        </select>
      </div>

      <div class="control">
        <label>Master Volume</label>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.25">
      </div>

      <div class="control">
        <label>Octave</label>
        <input id="octave" type="number" min="-2" max="3" step="1" value="0">
      </div>

      <div class="control">
        <label>Fine Tune (cents)</label>
        <input id="fineTune" type="range" min="-100" max="100" step="1" value="0">
      </div>

      <div class="control">
        <label>Filter Cutoff (Hz)</label>
        <input id="filterCutoff" type="range" min="500" max="10000" step="50" value="6000">
      </div>

      <div class="control">
        <label>Detune Depth (cents)</label>
        <input id="detuneDepth" type="range" min="0" max="50" step="1" value="5">
      </div>

      <div class="control">
        <label>Attack (ms)</label>
        <input id="attack" type="range" min="0" max="5000" step="10" value="12">
      </div>

      <div class="control">
        <label>Decay (ms)</label>
        <input id="decay" type="range" min="0" max="3000" step="10" value="120">
      </div>

      <div class="control">
        <label>Sustain (0–1)</label>
        <input id="sustain" type="range" min="0" max="1" step="0.01" value="0.8">
      </div>

      <div class="control">
        <label>Release (ms)</label>
        <input id="release" type="range" min="0" max="5000" step="10" value="300">
      </div>

      <div class="control">
        <label><input id="sustainHold" type="checkbox"> Hold sustain</label>
      </div>
    </div>

    <div class="keyboard" id="keyboard">
      <div class="keys" id="keys"></div>
      <div class="meta">
        <div class="hint">Keyboard: Z S X D C V G B H N J M , (white/black alternate)</div>
      </div>
    </div>

    <footer>
      Made with ❤️ — try adjusting fine tune, filter, and detune for a warm Casio tone.
    </footer>
  </div>

<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;
let ctx = null;
let masterGain, activeNotes = new Map();

const keyMap = {
  'z':48,'s':49,'x':50,'d':51,'c':52,'v':53,'g':54,'b':55,'h':56,'n':57,'j':58,'m':59,',':60,'l':61,'.':62,';':63,'/':64,
  'q':60,'2':61,'w':62,'3':63,'e':64,'r':65,'5':66,'t':67,'6':68,'y':69,'7':70,'u':71
};

const A4 = 440;
function freqFromMidi(m){ return 440 * Math.pow(2,(m-69)/12); }

const keysElem = document.getElementById('keys');
const startMidi = 48, numKeys = 24;
for(let i=0;i<numKeys;i++){
  const midi = startMidi + i;
  const noteName = midiToNoteName(midi);
  const isBlack = noteName.includes('#');
  const key = document.createElement('div');
  key.className = 'key ' + (isBlack? 'black':'white');
  key.dataset.midi = midi;
  key.innerHTML = `<div style="font-size:11px;opacity:0.8">${noteName}<br><span style='font-size:10px'>${midi}</span></div>`;
  key.addEventListener('pointerdown', e=>{e.preventDefault();startNote(midi,pointerVelocity(e));});
  key.addEventListener('pointerup', ()=>releaseNote(midi));
  key.addEventListener('pointerleave', e=>{if(e.buttons===1)releaseNote(midi);});
  keysElem.appendChild(key);
}

function midiToNoteName(m){
  const n=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  return n[m%12]+(Math.floor(m/12)-1);
}

const waveform=document.getElementById('waveform');
const volume=document.getElementById('volume');
const octaveControl=document.getElementById('octave');
const fineTune=document.getElementById('fineTune');
const filterCutoff=document.getElementById('filterCutoff');
const detuneDepth=document.getElementById('detuneDepth');
const attack=document.getElementById('attack');
const decay=document.getElementById('decay');
const sustain=document.getElementById('sustain');
const release=document.getElementById('release');
const sustainHold=document.getElementById('sustainHold');

function ensureAudio(){
  if(!ctx){
    ctx = new AudioContext();
    masterGain = ctx.createGain();
    masterGain.gain.value = parseFloat(volume.value);
    masterGain.connect(ctx.destination);
  }
}

volume.addEventListener('input',()=>{if(masterGain)masterGain.gain.setValueAtTime(parseFloat(volume.value),ctx.currentTime);});

function startNote(midi, velocity=1){
  ensureAudio();
  const finalMidi = midi + parseInt(octaveControl.value)*12;
  if(activeNotes.has(finalMidi))return;

  const osc = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const g = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  filter.type="lowpass";
  filter.frequency.value=parseFloat(filterCutoff.value);

  const cents=parseFloat(fineTune.value);
  const detune=parseFloat(detuneDepth.value);
  const baseFreq=freqFromMidi(finalMidi)*Math.pow(2,cents/1200);

  osc.type=waveform.value;
  osc.frequency.value=baseFreq;
  osc2.type=waveform.value;
  osc2.frequency.value=baseFreq;
  osc2.detune.value=detune; // detune second oscillator for warmth

  osc.connect(g);
  osc2.connect(g);
  g.connect(filter);
  filter.connect(masterGain);

  const now=ctx.currentTime;
  const a=parseFloat(attack.value)/1000;
  const d=parseFloat(decay.value)/1000;
  const s=parseFloat(sustain.value);
  const r=parseFloat(release.value)/1000;

  g.gain.cancelScheduledValues(now);
  g.gain.setValueAtTime(0.0001,now);
  g.gain.exponentialRampToValueAtTime(velocity,now+a);
  g.gain.exponentialRampToValueAtTime(velocity*s,now+a+d);

  osc.start(now);
  osc2.start(now);

  activeNotes.set(finalMidi,{osc,osc2,g,filter,velocity,r});
  highlightKey(finalMidi,true);
}

function releaseNote(midi){
  if(!ctx)return;
  const finalMidi=midi+parseInt(octaveControl.value)*12;
  if(!activeNotes.has(finalMidi))return;
  const note=activeNotes.get(finalMidi);
  const now=ctx.currentTime;
  if(sustainHold.checked)return;

  note.g.gain.cancelScheduledValues(now);
  note.g.gain.setValueAtTime(note.g.gain.value,now);
  note.g.gain.exponentialRampToValueAtTime(0.0001,now+note.r);
  const stopAt=now+note.r+0.05;
  note.osc.stop(stopAt);
  note.osc2.stop(stopAt);
  setTimeout(()=>{activeNotes.delete(finalMidi);highlightKey(finalMidi,false);},(note.r+0.1)*1000);
}

function pointerVelocity(e){
  if(e.pressure && e.pressure>0)return Math.min(1,Math.max(0.05,e.pressure));
  const rect=e.currentTarget.getBoundingClientRect();
  const y=e.clientY-rect.top;
  return Math.min(1,Math.max(0.05,1-(y/rect.height)));
}

function highlightKey(finalMidi,on){
  const orig=finalMidi-parseInt(octaveControl.value)*12;
  const keys=Array.from(keysElem.children);
  keys.forEach(k=>{if(parseInt(k.dataset.midi)===orig){k.classList.toggle('playing',on);}});
}

waveform.addEventListener('change',()=>{activeNotes.forEach(n=>{try{n.osc.type=waveform.value;n.osc2.type=waveform.value;}catch(e){}});});
filterCutoff.addEventListener('input',()=>{activeNotes.forEach(n=>{n.filter.frequency.value=parseFloat(filterCutoff.value);});});

window.addEventListener('keydown',e=>{
  if(e.repeat)return;
  const k=e.key.toLowerCase();
  if(k in keyMap){ensureAudio();startNote(keyMap[k]);}
  if(e.code==='Space'){sustainHold.checked=!sustainHold.checked;e.preventDefault();}
});
window.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(k in keyMap){releaseNote(keyMap[k]);}
});

window.addEventListener('pointerdown',()=>ensureAudio(),{once:true});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){activeNotes.forEach((_,m)=>{try{releaseNote(m-parseInt(octaveControl.value)*12);}catch(e){}});}
});
</script>
</body>
</html>
